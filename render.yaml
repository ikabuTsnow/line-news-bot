services:
  - type: web
    name: line-news-bot
    runtime: python
    buildCommand: apt-get install -y fonts-noto-cjk && pip install -r requirements.txt
    startCommand: python src/main.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: line-news-bot-db
          property: connectionString
      - key: CHANNEL_ACCESS_TOKEN
        sync: false
      - key: USER_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: line-news-bot-db
    plan: free